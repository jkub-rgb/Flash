<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#FF7043"/>
  <!-- Inner card shape -->
  <rect x="96" y="140" width="320" height="232" rx="36" fill="white" opacity="0.95"/>
  <!-- Star accent top right -->
  <text x="368" y="188" font-size="52" text-anchor="middle" font-family="sans-serif">⭐</text>
  <!-- Big letter A -->
  <text x="200" y="308" font-size="140" font-weight="900" font-family="'Fredoka One', 'Arial Rounded MT Bold', sans-serif" fill="#FF7043" text-anchor="middle">A</text>
  <!-- Math plus sign -->
  <text x="330" y="308" font-size="100" font-weight="900" font-family="sans-serif" fill="#42A5F5" text-anchor="middle">+</text>
  <!-- Bottom dots decoration -->
  <circle cx="176" cy="360" r="10" fill="#FFCA28" opacity="0.7"/>
  <circle cx="208" cy="360" r="10" fill="#66BB6A" opacity="0.7"/>
  <circle cx="240" cy="360" r="10" fill="#FF7043" opacity="0.7"/>
</svg>
